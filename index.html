<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* ── 背景画像 ── */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=85');
      background-size: cover;
      background-position: center 60%;
      filter: brightness(0.88);
      z-index: 0;
    }

    /* ── グラデーションオーバーレイ ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(10, 10, 30, 0.35) 0%,
        rgba(80, 30, 10, 0.25) 50%,
        rgba(10, 10, 40, 0.5) 100%
      );
      z-index: 1;
    }

    /* ── メインカード ── */
    .card {
      position: relative;
      z-index: 10;
      width: min(420px, 92vw);
      background: rgba(255, 245, 230, 0.10);
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      border: 1px solid rgba(255, 220, 170, 0.25);
      border-radius: 28px;
      padding: 48px 44px 44px;
      text-align: center;
      box-shadow:
        0 8px 48px rgba(0, 0, 0, 0.35),
        0 1px 0 rgba(255, 220, 150, 0.2) inset;
    }

    /* ── タイトル ── */
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.05rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(255, 220, 160, 0.85);
      margin-bottom: 36px;
    }

    /* ── 時刻表示 ── */
    .display {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 5.4rem;
      letter-spacing: 3px;
      font-variant-numeric: tabular-nums;
      color: rgba(255, 248, 235, 0.97);
      text-shadow: 0 0 40px rgba(255, 180, 80, 0.4);
      line-height: 1;
      margin-bottom: 12px;
      transition: color 0.5s, text-shadow 0.5s;
    }

    .display.running {
      color: #ffd580;
      text-shadow: 0 0 50px rgba(255, 200, 80, 0.6), 0 0 10px rgba(255, 220, 100, 0.4);
    }

    .display.finished {
      color: #ff8fa3;
      text-shadow: 0 0 50px rgba(255, 100, 130, 0.6);
      animation: pulse 1s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.8; }
      to   { opacity: 1; }
    }

    /* ── プログレスバー ── */
    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 99px;
      margin-bottom: 36px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f7971e, #ffd200, #ff6b6b);
      border-radius: 99px;
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
      width: 0%;
      box-shadow: 0 0 8px rgba(255, 180, 50, 0.7);
    }

    /* ── 入力フィールド ── */
    .input-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      align-items: flex-end;
      margin-bottom: 36px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .input-group label {
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 210, 150, 0.7);
    }

    .input-group input {
      width: 72px;
      padding: 10px 6px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      text-align: center;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 210, 150, 0.25);
      border-radius: 12px;
      color: rgba(255, 245, 220, 0.95);
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      -moz-appearance: textfield;
    }

    .input-group input::-webkit-outer-spin-button,
    .input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .input-group input:focus {
      border-color: rgba(255, 200, 100, 0.6);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 3px rgba(255, 190, 80, 0.12);
    }

    .sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: rgba(255, 200, 130, 0.5);
      padding-bottom: 6px;
    }

    /* ── ボタン ── */
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      flex: 1;
      padding: 13px 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.2s, opacity 0.2s;
    }

    button:active { transform: scale(0.95); }
    button:disabled { opacity: 0.3; cursor: default; transform: none; }

    #btnStart {
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
      color: #3a2000;
      box-shadow: 0 4px 20px rgba(247, 151, 30, 0.45);
    }

    #btnStart:not(:disabled):hover {
      box-shadow: 0 6px 28px rgba(247, 151, 30, 0.65);
      transform: translateY(-1px);
    }

    #btnPause {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 200, 150, 0.3);
      color: rgba(255, 235, 200, 0.9);
    }

    #btnPause:not(:disabled):hover {
      background: rgba(255, 255, 255, 0.16);
    }

    #btnReset {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 235, 210, 0.65);
    }

    #btnReset:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    /* ── メッセージ ── */
    .message {
      margin-top: 24px;
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: #ff8fa3;
      min-height: 20px;
      text-transform: uppercase;
    }

    /* ── 波紋アニメーション（完了時） ── */
    @keyframes ripple {
      0%   { transform: scale(0.9); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* ── モバイル対応 ── */
    @media (max-width: 540px) {
      body {
        align-items: flex-end;
        overflow: hidden;
      }

      .card {
        width: 100%;
        border-radius: 28px 28px 0 0;
        padding: 32px 28px 40px;
        /* 背景が上部に見えるよう、カードの高さを抑える */
        max-height: 65vh;
      }

      .title {
        font-size: 0.85rem;
        letter-spacing: 6px;
        margin-bottom: 20px;
      }

      .display {
        font-size: 4rem;
        margin-bottom: 8px;
      }

      .progress-bar {
        margin-bottom: 20px;
      }

      .input-row {
        margin-bottom: 20px;
        gap: 4px;
      }

      .input-group input {
        width: 62px;
        padding: 8px 4px;
        font-size: 1.35rem;
      }

      .sep {
        font-size: 1.6rem;
      }

      button {
        padding: 12px 8px;
        font-size: 0.68rem;
      }

      .message {
        margin-top: 16px;
        font-size: 0.68rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="card">
    <p class="title">Timer</p>

    <div class="display" id="display">00:00:00</div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <div class="input-row">
      <div class="input-group">
        <label>時間</label>
        <input type="number" id="inputH" min="0" max="23" value="0">
      </div>
      <span class="sep">:</span>
      <div class="input-group">
        <label>分</label>
        <input type="number" id="inputM" min="0" max="59" value="5">
      </div>
      <span class="sep">:</span>
      <div class="input-group">
        <label>秒</label>
        <input type="number" id="inputS" min="0" max="59" value="0">
      </div>
    </div>

    <div class="buttons">
      <button id="btnStart" onclick="start()">Start</button>
      <button id="btnPause" onclick="pause()" disabled>Pause</button>
      <button id="btnReset" onclick="reset()">Reset</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    let totalSeconds = 0;
    let remaining = 0;
    let interval = null;
    let running = false;

    const display  = document.getElementById('display');
    const progress = document.getElementById('progress');
    const message  = document.getElementById('message');
    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateDisplay(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      display.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    function updateProgress() {
      const pct = totalSeconds > 0 ? ((totalSeconds - remaining) / totalSeconds) * 100 : 0;
      progress.style.width = pct + '%';
    }

    function start() {
      if (running) return;

      if (remaining === 0) {
        const h = parseInt(document.getElementById('inputH').value) || 0;
        const m = parseInt(document.getElementById('inputM').value) || 0;
        const s = parseInt(document.getElementById('inputS').value) || 0;
        totalSeconds = h * 3600 + m * 60 + s;
        remaining = totalSeconds;
      }

      if (remaining <= 0) { message.textContent = '時間を設定してください'; return; }

      message.textContent = '';
      running = true;
      display.className = 'display running';
      btnStart.disabled = true;
      btnPause.disabled = false;

      interval = setInterval(() => {
        remaining--;
        updateDisplay(remaining);
        updateProgress();

        if (remaining <= 0) {
          clearInterval(interval);
          running = false;
          display.className = 'display finished';
          message.textContent = '✦  時間になりました  ✦';
          btnStart.disabled = false;
          btnPause.disabled = true;
          if (Notification.permission === 'granted') {
            new Notification('🌅 タイマー終了', { body: '時間になりました！' });
          }
        }
      }, 1000);
    }

    function pause() {
      if (!running) return;
      clearInterval(interval);
      running = false;
      display.className = 'display';
      btnStart.disabled = false;
      btnStart.textContent = 'Resume';
      btnPause.disabled = true;
    }

    function reset() {
      clearInterval(interval);
      running = false;
      remaining = 0;
      totalSeconds = 0;
      updateDisplay(0);
      progress.style.width = '0%';
      display.className = 'display';
      message.textContent = '';
      btnStart.disabled = false;
      btnStart.textContent = 'Start';
      btnPause.disabled = true;
    }

    if ('Notification' in window) Notification.requestPermission();
    updateDisplay(0);
  </script>
</body>
</html>
